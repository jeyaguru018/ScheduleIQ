server:
  port: 8080
  # Graceful shutdown: waits up to 30s for in-flight requests to complete
  shutdown: graceful
  lifecycle:
    timeout-per-shutdown-phase: 30s

spring:
  application:
    name: scheduleiq-backend

  datasource:
    # URL for local/production PostgreSQL database.
    # Set SPRING_DATASOURCE_URL in your environment (Render dashboard, .env file, etc.)
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scheduleiq_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    # SECURITY: Never hardcode passwords. Set SPRING_DATASOURCE_PASSWORD in your environment.
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Connection pool tuned for 10,000-user concurrent workloads
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000      # 5 minutes
      connection-timeout: 20000 # 20 seconds — fail fast, don't queue forever
      max-lifetime: 1800000     # 30 minutes — recycle connections to prevent stale handles
      pool-name: ScheduleIQ-Pool

  jpa:
    hibernate:
      # Auto-generates and updates the database tables based on our Java Classes automatically
      ddl-auto: update
    show-sql: false  # Disabled in production — too noisy; use structured logs instead
    open-in-view: false  # Prevent open-in-view anti-pattern; forces explicit transactions
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25       # Bulk inserts in batches (critical for seeder performance)
          fetch_size: 50       # Cursor-based fetching for large result sets
        order_inserts: true
        order_updates: true

  # Cache configuration: Caffeine in-memory cache
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s  # 5-minute TTL, max 500 entries

  # SMTP Mail settings using Gmail App Password
  # SECURITY: Set MAIL_USERNAME and MAIL_PASSWORD in your environment variables.
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@scheduleiq.com}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 3000
          timeout: 3000
          writetimeout: 3000
          starttls:
            enable: true

  # Security OAuth2 Google login settings
  # SECURITY: Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in your environment variables.
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  # Thread pool sizing for async auto-scheduling optimization jobs
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
        thread-name-prefix: opt-job-

# Custom properties
app:
  jwt:
    # SECURITY: JWT secret must be set via environment variable in production.
    # Generate a secure 256-bit key: openssl rand -base64 32
    secret: ${JWT_SECRET}
    expiration-ms: 86400000 # 24 hours
  ml-service:
    url: ${ML_SERVICE_URL:http://localhost:8000}
  # Frontend URL for links in outgoing emails (e.g., welcome, shift published)
  frontend-url: ${FRONTEND_URL:https://schedule-iq.beta.vercel.app}

# Actuator: Production health, metrics, and Prometheus exposure
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized  # Full details only to authenticated calls
    prometheus:
      enabled: true
  metrics:
    tags:
      application: scheduleiq-backend
    export:
      prometheus:
        enabled: true
  info:
    env:
      enabled: true

# Application info for /actuator/info
info:
  app:
    name: ScheduleIQ Backend
    version: 1.0.0
    description: Intelligent Workforce Planning API
