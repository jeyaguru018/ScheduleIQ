version: '3.9'

# ════════════════════════════════════════════════════════════════
#  ScheduleIQ v2.0 — Full Stack Docker Compose
#  Services: PostgreSQL | Redis | Spring Boot API | Python ML | React UI
# ════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL Database ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: scheduleiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scheduleiq_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scheduleiq_secure_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - scheduleiq-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d scheduleiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis Cache (v2.0) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: scheduleiq-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - scheduleiq-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Spring Boot Backend API ────────────────────────────────────
  backend:
    build:
      context: ./scheduleiq-backend
      dockerfile: Dockerfile
    container_name: scheduleiq-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/scheduleiq_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-scheduleiq_secure_2024}
      SPRING_REDIS_URL: redis://redis:6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      APP_JWT_SECRET: ${JWT_SECRET:-dGhpc2lzYW11bHRpcGxlcmVnaW9uYWx3b3JrZm9yY2VvcHRpbWl6YXRpb25zZWN1cml0eWtleTI1NmJpdHM=}
      APP_JWT_EXPIRATION_MS: 86400000
      APP_ML_SERVICE_URL: http://ml-service:8000
    ports:
      - "8080:8080"
    networks:
      - scheduleiq-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/auth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Python ML Service (Prophet + scikit-learn) ─────────────────
  ml-service:
    build:
      context: ./scheduleiq-ml-service
      dockerfile: Dockerfile
    container_name: scheduleiq-ml
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "8000:8000"
    networks:
      - scheduleiq-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── React Frontend (Nginx) ─────────────────────────────────────
  frontend:
    build:
      context: ./scheduleiq-frontend
      dockerfile: Dockerfile
    container_name: scheduleiq-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - scheduleiq-network

# ── Volumes & Networks ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  scheduleiq-network:
    driver: bridge
